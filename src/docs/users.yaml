paths:
  /users/me:
    get:
      summary: Get current logged in user details
      tags: [Users]
      security:
        - BearerAuth: []
      responses:
        200:
          description: User details
  /users:
    get:
      summary: Get all users (Admin only)
      tags: [Users]
      security:
        - BearerAuth: []
      responses:
        200:
          description: List of users
